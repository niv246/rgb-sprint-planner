<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB Sprint Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #F8F8F6;
  --surface: #FFFFFF;
  --surface-hover: #F3F3F0;
  --border: #E5E5E0;
  --border-light: #EEEEEA;
  --text: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-muted: #9B9B9B;
  --indigo: #6366F1;
  --indigo-light: #EEF2FF;
  --indigo-border: #C7D2FE;
  --green: #22C55E;
  --green-light: #F0FDF4;
  --green-border: #BBF7D0;
  --amber: #F59E0B;
  --amber-light: #FFFBEB;
  --amber-border: #FDE68A;
  --red: #EF4444;
  --red-light: #FEF2F2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-sm: 6px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 56px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--indigo);
  letter-spacing: -0.5px;
}
.logo span { color: var(--text-muted); font-weight: 400; font-size: 14px; margin-right: 8px; }
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cycle-info {
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--surface-hover);
  padding: 4px 12px;
  border-radius: 20px;
}

/* ── Layout ── */
.layout {
  display: flex;
  height: calc(100vh - 56px);
}

/* ── Weekly Panel (LEFT) ── */
.weekly-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.weekly-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.weekly-title {
  font-size: 15px;
  font-weight: 600;
}
.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.week-nav button {
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 30px;
  height: 30px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.week-nav button:hover { background: var(--indigo-light); border-color: var(--indigo-border); }
.week-label {
  font-size: 13px;
  font-weight: 500;
  min-width: 100px;
  text-align: center;
  color: var(--text-secondary);
}
.weekly-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.person-section {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}
.person-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface-hover);
  border-bottom: 1px solid var(--border-light);
}
.person-name {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.person-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
}
.person-stats {
  font-size: 12px;
  color: var(--text-muted);
}
.person-tasks {
  min-height: 48px;
  padding: 4px;
}
.person-tasks.drag-over {
  background: var(--indigo-light);
}
.weekly-task {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
  cursor: grab;
}
.weekly-task:hover { background: var(--surface-hover); }
.weekly-task.dragging { opacity: 0.4; }

.status-btn {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  background: white;
}
.status-btn.in-progress {
  border-color: var(--amber);
  background: var(--amber-light);
}
.status-btn.done {
  border-color: var(--green);
  background: var(--green);
  color: white;
}
.weekly-task-name {
  flex: 1;
  font-size: 13px;
  min-width: 0;
}
.weekly-task-name.done-text {
  text-decoration: line-through;
  color: var(--text-muted);
}
.weekly-task-cat {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
  flex-shrink: 0;
}
.task-note-icon {
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
}
.task-note-icon:hover { color: var(--indigo); }
.remove-weekly {
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.weekly-task:hover .remove-weekly { opacity: 1; }
.remove-weekly:hover { color: var(--red); }

.empty-person {
  padding: 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  border: 2px dashed var(--border-light);
  border-radius: var(--radius-sm);
  margin: 4px;
}

/* ── Weekly Footer Progress ── */
.weekly-footer {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-person {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 70px;
}
.progress-name {
  font-size: 12px;
  font-weight: 500;
}
.progress-track {
  flex: 1;
  height: 8px;
  background: var(--surface-hover);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s ease;
}
.progress-pct {
  font-size: 12px;
  font-weight: 600;
  min-width: 36px;
  text-align: left;
  color: var(--text-secondary);
}

/* ── Resize Divider ── */
.resize-handle {
  width: 6px;
  cursor: col-resize;
  background: transparent;
  position: relative;
  flex-shrink: 0;
  z-index: 10;
  transition: background 0.15s;
}
.resize-handle:hover, .resize-handle.active {
  background: var(--indigo);
  opacity: 0.3;
}
.resize-handle::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 2px;
  height: 32px;
  border-radius: 2px;
  background: var(--text-muted);
  opacity: 0;
  transition: opacity 0.15s;
}
.resize-handle:hover::after, .resize-handle.active::after { opacity: 0.6; }

/* ── Monthly Panel (RIGHT) ── */
.monthly-panel {
  min-width: 380px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-left: 1px solid var(--border);
  flex-shrink: 0;
}
.monthly-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.monthly-title {
  font-size: 15px;
  font-weight: 600;
}
.add-task-btn {
  background: var(--indigo);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.add-task-btn:hover { background: #5558E6; }
.monthly-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.category-group {
  margin-bottom: 8px;
}
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
  user-select: none;
}
.category-header:hover { background: var(--surface-hover); }
.category-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}
.category-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.category-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface-hover);
  padding: 1px 8px;
  border-radius: 10px;
}
.category-chevron {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.category-chevron.collapsed { transform: rotate(-90deg); }
.category-tasks {
  padding: 2px 0 2px 16px;
}
.monthly-task {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  cursor: grab;
  transition: all 0.15s;
  position: relative;
}
.monthly-task:hover { background: var(--surface-hover); }
.monthly-task.dragging { opacity: 0.4; }
.monthly-task.pulled {
  text-decoration: line-through;
  color: var(--text-muted);
}
.monthly-task-name {
  flex: 1;
  font-size: 13px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}
.monthly-task-name:hover { color: var(--indigo); }
.weekly-task-name { cursor: pointer; }
.weekly-task-name:hover { color: var(--indigo); }

/* Avatar stack for multi-assignee */
.avatar-stack {
  display: flex;
  flex-direction: row-reverse;
  flex-shrink: 0;
  gap: 0;
}
.avatar-stack .person-avatar {
  width: 18px;
  height: 18px;
  font-size: 9px;
  margin-left: -6px;
  border: 1.5px solid var(--surface);
  flex-shrink: 0;
}
.avatar-stack .person-avatar:last-child { margin-left: 0; }

/* View modal — readonly details */
.view-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 14px;
  margin-bottom: 4px;
}
.view-detail-cell {
  background: var(--surface-hover);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 62px;
}
.view-detail-cell.full { grid-column: 1 / -1; }
.view-detail-cell .view-detail-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.2px;
}
.view-detail-cell .view-detail-value {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
}
.view-detail-cell.notes {
  min-height: 90px;
  background: var(--surface);
  border: 1px solid var(--border-light);
}
.view-detail-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.view-detail-row:last-child { border-bottom: none; }
.view-detail-label {
  font-weight: 500;
  color: var(--text-secondary);
  width: 90px;
  flex-shrink: 0;
}
.view-detail-value {
  flex: 1;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.view-detail-value.muted { color: var(--text-muted); }
.view-priority-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 12px;
  background: var(--surface-hover);
}
.view-status-chip {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.view-status-chip.todo { background: #FEF3C7; color: #92400E; }
.view-status-chip.progress { background: #DBEAFE; color: #1E40AF; }
.view-status-chip.done { background: #D1FAE5; color: #065F46; }
.view-status-chip.backlog { background: var(--surface-hover); color: var(--text-muted); }
.view-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  line-height: 1.4;
}
.view-assignees-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.view-assignee-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px 3px 4px;
  border-radius: 20px;
  font-size: 12px;
  background: var(--surface-hover);
}
.view-assignee-chip .person-avatar {
  width: 18px;
  height: 18px;
  font-size: 9px;
}
.modal-actions .danger {
  color: var(--red);
  border-color: var(--red);
}
.modal-actions .danger:hover { background: var(--red-light); }
.pulled-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  background: var(--indigo-light);
  color: var(--indigo);
  font-weight: 500;
  flex-shrink: 0;
}
.push-btn {
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
  background: none;
  border: none;
  padding: 2px;
}
.monthly-task:hover .push-btn { opacity: 1; }
.push-btn:hover { color: var(--indigo); }
.edit-btn {
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.monthly-task:hover .edit-btn { opacity: 1; }
.edit-btn:hover { color: var(--indigo); }
.delete-btn {
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.monthly-task:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: var(--red); }

/* ── Undo Toast ── */
.undo-toast {
  position: fixed;
  bottom: -60px;
  left: 50%;
  transform: translateX(-50%);
  background: #1A1A1A;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 14px;
  font-family: 'Rubik', sans-serif;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  z-index: 9999;
  transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  direction: rtl;
}
.undo-toast.show { bottom: 24px; }
.undo-toast .undo-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.3);
  color: #6366F1;
  font-weight: 600;
  font-size: 14px;
  font-family: 'Rubik', sans-serif;
  cursor: pointer;
  padding: 4px 14px;
  border-radius: 6px;
  transition: all 0.15s;
}
.undo-toast .undo-btn:hover { background: rgba(99,102,241,0.15); border-color: #6366F1; }
.undo-toast .undo-timer {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  position: absolute;
  bottom: 0;
  right: 0;
  overflow: hidden;
}
.undo-toast .undo-timer-bar {
  height: 100%;
  background: #6366F1;
  border-radius: 2px;
  animation: undoCountdown 8s linear forwards;
}
@keyframes undoCountdown { from { width: 100%; } to { width: 0%; } }

.priority-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.priority-dot.p0 { background: var(--red); }
.priority-dot.p1 { background: var(--amber); }
.priority-dot.p2 { background: var(--text-muted); }

/* ── Modal ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  width: 420px;
  max-width: 90vw;
  box-shadow: var(--shadow-lg);
}
.modal h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
}
.modal label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input, .modal select, .modal textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  background: var(--bg);
  outline: none;
  transition: border 0.15s;
}
.modal input:focus, .modal select:focus, .modal textarea:focus {
  border-color: var(--indigo);
}
.modal textarea { resize: vertical; min-height: 60px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  margin-top: 20px;
}
.modal-actions button {
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: all 0.15s;
}
.modal-actions .primary {
  background: var(--indigo);
  color: white;
  border-color: var(--indigo);
}
.modal-actions .primary:hover { background: #5558E6; }

/* ── Add Category ── */
.add-category-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
}
.add-category-row input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.add-category-row button {
  background: var(--indigo);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
}

/* ── Assignee select in modal ── */
.assignee-chips {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.assignee-chip {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.assignee-chip.selected {
  background: var(--indigo-light);
  border-color: var(--indigo-border);
  color: var(--indigo);
  font-weight: 500;
}

/* Category colors */
.cat-backend { background: #DBEAFE; color: #1E40AF; }
.cat-frontend { background: #FCE7F3; color: #9D174D; }
.cat-business { background: #FEF3C7; color: #92400E; }
.cat-legal { background: #E0E7FF; color: #3730A3; }
.cat-design { background: #F3E8FF; color: #6B21A8; }
.cat-marketing { background: #D1FAE5; color: #065F46; }
.cat-security { background: #FEE2E2; color: #991B1B; }
.cat-devops { background: #CCFBF1; color: #115E59; }
.cat-default { background: var(--surface-hover); color: var(--text-secondary); }

/* ── View Toggle ── */
.view-toggle {
  display: flex;
  background: var(--surface-hover);
  border-radius: 8px;
  padding: 2px;
  gap: 2px;
}
.view-toggle button {
  padding: 5px 14px;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.view-toggle button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ── Next Meeting Card ── */
.next-meeting-section {
  margin: 8px 12px;
  padding: 12px;
  background: var(--indigo-light);
  border: 1px solid var(--indigo-border);
  border-radius: var(--radius);
}
.next-meeting-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--indigo);
  margin-bottom: 6px;
}
.next-meeting-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.next-meeting-time {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.next-meeting-empty {
  font-size: 12px;
  color: var(--text-muted);
}

/* ── Calendar View ── */
.calendar-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.calendar-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.calendar-nav button {
  background: var(--surface-hover);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 30px;
  height: 30px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.calendar-nav button:hover { background: var(--indigo-light); border-color: var(--indigo-border); }
.calendar-month-label {
  font-size: 15px;
  font-weight: 600;
  min-width: 140px;
  text-align: center;
}
.add-meeting-btn {
  background: var(--indigo);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.add-meeting-btn:hover { background: #5558E6; }
.calendar-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  margin-bottom: 4px;
}
.cal-weekday {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 6px 0;
}
.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.cal-day {
  min-height: 80px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  padding: 4px 6px;
  cursor: pointer;
  transition: background 0.1s;
}
.cal-day:hover { background: var(--surface-hover); }
.cal-day.other-month { opacity: 0.35; }
.cal-day.today { border-color: var(--indigo); border-width: 2px; }
.cal-day-num {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 2px;
}
.cal-day.today .cal-day-num { color: var(--indigo); font-weight: 700; }
.cal-meeting {
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 4px;
  margin-bottom: 2px;
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: opacity 0.1s;
}
.cal-meeting:hover { opacity: 0.8; }
.cal-meeting.type-weekly { background: var(--indigo-light); color: var(--indigo); border-right: 2px solid var(--indigo); }
.cal-meeting.type-external { background: var(--green-light); color: #166534; border-right: 2px solid var(--green); }
.cal-meeting.type-custom { background: var(--amber-light); color: #92400E; border-right: 2px solid var(--amber); }
.cal-meeting.multi-day { opacity: 0.85; font-size: 9px; }
.date-range-row { display: flex; gap: 10px; }
.date-range-row > div { flex: 1; }
.date-range-row label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
.date-range-row input { width: 100%; }

/* ── Meeting Modal extras ── */
.meeting-type-chips {
  display: flex;
  gap: 6px;
  margin-top: 4px;
}
.meeting-type-chip {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.meeting-type-chip.selected { font-weight: 500; }
.meeting-type-chip.selected.type-weekly { background: var(--indigo-light); border-color: var(--indigo-border); color: var(--indigo); }
.meeting-type-chip.selected.type-external { background: var(--green-light); border-color: var(--green-border); color: #166534; }
.meeting-type-chip.selected.type-custom { background: var(--amber-light); border-color: var(--amber-border); color: #92400E; }
.auto-repeat-note {
  font-size: 11px;
  color: var(--indigo);
  margin-top: 4px;
  padding: 4px 8px;
  background: var(--indigo-light);
  border-radius: 4px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Note tooltip ── */
.note-popup {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  box-shadow: var(--shadow-md);
  z-index: 50;
  max-width: 260px;
}
.note-popup textarea {
  width: 100%;
  min-height: 60px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-family: inherit;
  font-size: 12px;
  resize: vertical;
  outline: none;
}
.note-popup textarea:focus { border-color: var(--indigo); }
.note-popup-actions {
  display: flex;
  justify-content: flex-end;
  gap: 4px;
  margin-top: 6px;
}
.note-popup-actions button {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-family: inherit;
}
.note-popup-actions .save {
  background: var(--indigo);
  color: white;
  border-color: var(--indigo);
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ── State ──
const PEOPLE = [
  { id: 'niv', name: 'ניב', color: '#6366F1' },
  { id: 'omer', name: 'עומר', color: '#22C55E' },
  { id: 'dana', name: 'דנה', color: '#F59E0B' }
];

const DEFAULT_CATEGORIES = [
  { id: 'backend', name: 'Backend', color: '#3B82F6' },
  { id: 'frontend', name: 'Frontend', color: '#EC4899' },
  { id: 'business', name: 'Business', color: '#F59E0B' },
  { id: 'legal', name: 'Legal', color: '#6366F1' },
  { id: 'design', name: 'Design', color: '#8B5CF6' },
  { id: 'marketing', name: 'Marketing', color: '#10B981' },
  { id: 'security', name: 'Security', color: '#EF4444' },
  { id: 'devops', name: 'DevOps', color: '#14B8A6' },
];

let state = {
  categories: [...DEFAULT_CATEGORIES],
  tasks: [],
  currentWeek: 1,
  currentCycle: 1,
  collapsedCategories: {},
  nextId: 1,
  modal: null, // null | 'add' | 'edit' | 'assign' | 'view'
  editingTask: null,
  notePopup: null,
  addingCategory: false,
  monthlyWidth: 380,
  currentView: 'sprint', // 'sprint' | 'calendar'
  meetings: [],
  meetingNextId: 1,
  calendarMonth: new Date().getMonth(),
  calendarYear: new Date().getFullYear(),
  meetingModal: null, // null | 'add' | 'edit'
  editingMeeting: null,
  undoStack: [],  // [{type, item, timestamp}]
};

// ── Persistence (Server API) ──
async function loadState() {
  try {
    const res = await fetch('/api/state');
    if (res.status === 401) { window.location.href = '/login'; return; }
    if (!res.ok) { console.error('Load failed:', res.status); return; }
    const data = await res.json();
    // Protect against loading empty/error responses
    if (!data.tasks || !Array.isArray(data.tasks)) { console.error('Invalid state from server'); return; }
    state = { ...state, ...data, modal: null, notePopup: null, addingCategory: false, editingTask: null, meetingModal: null, editingMeeting: null, undoStack: state.undoStack || [] };
  } catch(e) {
    console.error('Failed to load state:', e);
  }
}

async function saveToServer() {
  try {
    const d = { ...state };
    delete d.modal;
    delete d.notePopup;
    delete d.addingCategory;
    delete d.editingTask;
    delete d.meetingModal;
    delete d.editingMeeting;
    delete d.undoStack;
    const res = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(d)
    });
    if (res.status === 401) { window.location.href = '/login'; return; }
    if (res.status === 409) {
      // Server blocked save to prevent data loss — reload fresh state
      console.warn('Save blocked by server (anti-overwrite), reloading...');
      await loadState();
      render();
    }
  } catch(e) {
    console.error('Failed to save state:', e);
  }
}

let saveTimeout;
function save() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveToServer(), 500);
}

// ── Helpers ──
function getCatClass(catId) {
  const map = { backend:'cat-backend', frontend:'cat-frontend', business:'cat-business', legal:'cat-legal', design:'cat-design', marketing:'cat-marketing', security:'cat-security', devops:'cat-devops' };
  return map[catId] || 'cat-default';
}
// Returns the canonical list of assignee ids for a task.
// Prefers t.assignees (array, new field) but falls back to t.assignee (legacy single string).
function getTaskAssignees(t) {
  if (Array.isArray(t.assignees) && t.assignees.length) return t.assignees;
  return t.assignee ? [t.assignee] : [];
}
function getWeekLabel(week, cycle) {
  return `שבוע ${week} · מחזור ${cycle}`;
}
function getTasksForPersonWeek(personId) {
  return state.tasks.filter(t =>
    t.weeklyAssignment &&
    t.weeklyAssignment.week === state.currentWeek &&
    t.weeklyAssignment.cycle === state.currentCycle &&
    getTaskAssignees(t).includes(personId)
  );
}

// ── Drag & Drop ──
let dragData = null;

// ── Render ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="header">
      <div class="header-right">
        <div class="logo">RGB <span>Sprint Planner</span></div>
        <div class="view-toggle">
          <button class="${state.currentView === 'sprint' ? 'active' : ''}" onclick="switchView('sprint')">ספרינט</button>
          <button class="${state.currentView === 'calendar' ? 'active' : ''}" onclick="switchView('calendar')">לוח שנה</button>
        </div>
      </div>
      <div class="header-left">
        <div class="cycle-info">מחזור ${state.currentCycle} · 20 ימים</div>
        <a href="/api/logout" style="font-size:12px;color:var(--text-muted);text-decoration:none;margin-right:12px;opacity:0.6;transition:opacity 0.15s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6" title="התנתק">יציאה ↩</a>
      </div>
    </div>
    <div class="layout">
      ${renderMonthly()}
      <div class="resize-handle" id="resize-handle"></div>
      ${state.currentView === 'sprint' ? renderWeekly() : renderCalendar()}
    </div>
    ${state.modal ? renderModal() : ''}
    ${state.meetingModal ? renderMeetingModal() : ''}
    ${state.notePopup ? renderNotePopup() : ''}
  `;
  attachEvents();
}

function renderWeekly() {
  return `
    <div class="weekly-panel">
      <div class="weekly-header">
        <div class="weekly-title">ספרינט שבועי</div>
        <div class="week-nav">
          <button onclick="changeWeek(1)" title="שבוע הבא">◀</button>
          <div class="week-label">${getWeekLabel(state.currentWeek, state.currentCycle)}</div>
          <button onclick="changeWeek(-1)" title="שבוע קודם">▶</button>
        </div>
      </div>
      <div class="weekly-body">
        ${PEOPLE.map(p => renderPersonSection(p)).join('')}
      </div>
      <div class="weekly-footer">
        ${PEOPLE.map(p => {
          const tasks = getTasksForPersonWeek(p.id);
          const done = tasks.filter(t => t.weeklyAssignment.status === 'done').length;
          const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
          return `
          <div class="progress-row">
            <div class="progress-person">
              <div class="person-avatar" style="background:${p.color};width:22px;height:22px;font-size:9px">${p.name.charAt(0)}</div>
              <span class="progress-name">${p.name}</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%;background:${p.color}"></div>
            </div>
            <span class="progress-pct">${pct}%</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderPersonSection(person) {
  const tasks = getTasksForPersonWeek(person.id);
  const done = tasks.filter(t => t.weeklyAssignment.status === 'done').length;
  return `
    <div class="person-section">
      <div class="person-header">
        <div class="person-name">
          <div class="person-avatar" style="background:${person.color}">${person.name.charAt(0)}</div>
          ${person.name}
        </div>
        <div class="person-stats">${done}/${tasks.length} הושלמו</div>
      </div>
      <div class="person-tasks" data-person="${person.id}"
           ondragover="onWeeklyDragOver(event)" ondragleave="onWeeklyDragLeave(event)" ondrop="onWeeklyDrop(event, '${person.id}')">
        ${tasks.length === 0 ? `<div class="empty-person">גרור משימות מהמונטלי או לחץ ←</div>` :
          tasks.map(t => renderWeeklyTask(t)).join('')}
      </div>
    </div>
  `;
}

function renderWeeklyTask(task) {
  const st = task.weeklyAssignment.status;
  const statusClass = st === 'progress' ? 'in-progress' : st === 'done' ? 'done' : '';
  const checkmark = st === 'done' ? '✓' : st === 'progress' ? '◑' : '';
  const nameClass = st === 'done' ? 'weekly-task-name done-text' : 'weekly-task-name';
  const cat = state.categories.find(c => c.id === task.category);
  return `
    <div class="weekly-task" draggable="true" data-task-id="${task.id}"
         ondragstart="onDragStart(event, ${task.id}, 'weekly')">
      <div class="status-btn ${statusClass}" onclick="cycleStatus(${task.id})" title="שנה סטטוס">${checkmark}</div>
      <div class="${nameClass}" onclick="event.stopPropagation();openViewModal(${task.id})" title="לחץ לצפייה בפרטים">${task.name}</div>
      ${cat ? `<span class="weekly-task-cat ${getCatClass(task.category)}">${cat.name}</span>` : ''}
      <span class="task-note-icon" onclick="openNote(event, ${task.id})" title="הערה">${task.note ? '📝' : '💬'}</span>
      <span class="remove-weekly" onclick="removeFromWeekly(${task.id})" title="החזר למונטלי">✕</span>
    </div>
  `;
}

function renderMonthly() {
  const grouped = {};
  state.categories.forEach(c => grouped[c.id] = []);
  state.tasks.forEach(t => {
    if (grouped[t.category]) grouped[t.category].push(t);
  });
  return `
    <div class="monthly-panel" style="width:${state.monthlyWidth}px">
      <div class="monthly-header">
        <div class="monthly-title">Backlog מונטלי</div>
        <button class="add-task-btn" style="background:#24292F;margin-left:6px;" onclick="syncGitHub()" id="sync-btn">⟳ GitHub</button>
        <button class="add-task-btn" onclick="openAddModal()">+ משימה חדשה</button>
      </div>
      <div class="monthly-body">
        ${state.categories.map(cat => {
          const tasks = grouped[cat.id] || [];
          const collapsed = state.collapsedCategories[cat.id];
          return `
            <div class="category-group">
              <div class="category-header" onclick="toggleCategory('${cat.id}')">
                <div class="category-label">
                  <div class="category-dot" style="background:${cat.color}"></div>
                  ${cat.name}
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                  <span class="category-count">${tasks.length}</span>
                  <span class="category-chevron ${collapsed ? 'collapsed' : ''}">▼</span>
                </div>
              </div>
              ${!collapsed ? `<div class="category-tasks">
                ${tasks.map(t => renderMonthlyTask(t)).join('')}
              </div>` : ''}
            </div>
          `;
        }).join('')}
        ${state.addingCategory ? `
          <div class="add-category-row">
            <input id="new-cat-input" placeholder="שם קטגוריה חדשה..." autofocus />
            <button onclick="addCategory()">הוסף</button>
          </div>
        ` : `
          <div style="padding:8px">
            <span style="font-size:12px;color:var(--text-muted);cursor:pointer" onclick="state.addingCategory=true;render()">+ קטגוריה חדשה</span>
          </div>
        `}
        ${renderNextMeeting()}
      </div>
    </div>
  `;
}

function renderMonthlyTask(task) {
  const pulled = task.weeklyAssignment !== null;
  const assignees = getTaskAssignees(task);
  const persons = assignees.map(id => PEOPLE.find(p => p.id === id)).filter(Boolean);
  return `
    <div class="monthly-task ${pulled ? 'pulled' : ''}" draggable="true" data-task-id="${task.id}"
         ondragstart="onDragStart(event, ${task.id}, 'monthly')">
      <div class="priority-dot ${task.priority}"></div>
      <div class="monthly-task-name" onclick="event.stopPropagation();openViewModal(${task.id})" title="לחץ לצפייה בפרטים">${task.name}</div>
      ${pulled ? `<span class="pulled-tag">ש׳${task.weeklyAssignment.week}</span>` : ''}
      ${persons.length ? `<div class="avatar-stack">${persons.map(p => `<div class="person-avatar" style="background:${p.color}" title="${p.name}">${p.name.charAt(0)}</div>`).join('')}</div>` : ''}
      ${!pulled ? `<button class="push-btn" onclick="openAssignModal(${task.id})" title="העבר לוויקלי">←</button>` : ''}
      <span class="edit-btn" onclick="openEditModal(${task.id})" title="ערוך">✎</span>
      <span class="delete-btn" onclick="deleteTask(${task.id})" title="מחק">🗑</span>
    </div>
  `;
}

function renderModal() {
  if (state.modal === 'add' || state.modal === 'edit') {
    const t = state.editingTask || {};
    const isEdit = state.modal === 'edit';
    const selected = Array.isArray(t.assignees) ? t.assignees : [];
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <h3>${isEdit ? 'ערוך משימה' : 'משימה חדשה'}</h3>
          <label>שם המשימה</label>
          <input id="m-name" value="${t.name || ''}" placeholder="תאר את המשימה..." />
          <label>קטגוריה</label>
          <select id="m-cat">
            ${state.categories.map(c => `<option value="${c.id}" ${t.category === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
          </select>
          <label>עדיפות</label>
          <select id="m-priority">
            <option value="p0" ${t.priority === 'p0' ? 'selected' : ''}>P0 — קריטי</option>
            <option value="p1" ${t.priority === 'p1' ? 'selected' : ''}>P1 — חשוב</option>
            <option value="p2" ${t.priority === 'p2' ? 'selected' : ''}>P2 — עתידי</option>
          </select>
          <label>אחראי (אפשר לבחור כמה)</label>
          <div class="assignee-chips">
            ${PEOPLE.map(p => `<div class="assignee-chip ${selected.includes(p.id) ? 'selected' : ''}" data-person="${p.id}" onclick="toggleAssigneeChip('${p.id}')">${p.name}</div>`).join('')}
          </div>
          <label>הערה</label>
          <textarea id="m-note" placeholder="פרטים נוספים...">${t.note || ''}</textarea>
          <div class="modal-actions">
            <button class="primary" onclick="saveTask()">${isEdit ? 'שמור' : 'הוסף'}</button>
            <button onclick="state.modal=null;state.editingTask=null;render()">ביטול</button>
          </div>
        </div>
      </div>
    `;
  }
  if (state.modal === 'assign') {
    const t = state.editingTask;
    const selected = Array.isArray(t.assignees) ? t.assignees : [];
    return `
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <h3>העבר לוויקלי — שבוע ${state.currentWeek}</h3>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">${t.name}</p>
          <label>שייך ל (אפשר לבחור כמה)</label>
          <div class="assignee-chips">
            ${PEOPLE.map(p => `<div class="assignee-chip ${selected.includes(p.id) ? 'selected' : ''}" data-person="${p.id}" onclick="toggleAssigneeChip('${p.id}')">${p.name}</div>`).join('')}
          </div>
          <div class="modal-actions">
            <button class="primary" onclick="confirmAssign()">העבר</button>
            <button onclick="state.modal=null;state.editingTask=null;render()">ביטול</button>
          </div>
        </div>
      </div>
    `;
  }
  if (state.modal === 'view') {
    return renderViewModal();
  }
  return '';
}

function renderViewModal() {
  const t = state.editingTask;
  if (!t) return '';
  const cat = state.categories.find(c => c.id === t.category);
  const assignees = getTaskAssignees(t);
  const persons = assignees.map(id => PEOPLE.find(p => p.id === id)).filter(Boolean);
  const priorityLabel = { p0: 'P0 — קריטי', p1: 'P1 — חשוב', p2: 'P2 — עתידי' }[t.priority] || t.priority;
  const pulled = t.weeklyAssignment;
  const statusMap = { todo: 'לא התחיל', progress: 'בתהליך', done: 'הושלם' };
  const statusClass = pulled ? (pulled.status || 'todo') : 'backlog';
  const statusLabel = pulled ? (statusMap[pulled.status] || 'לא התחיל') : 'ב-Backlog';
  return `
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()" style="width:520px;max-width:92vw">
        <div class="view-title">${t.name || ''}</div>
        <div class="view-grid">
          <div class="view-detail-cell">
            <div class="view-detail-label">קטגוריה</div>
            <div class="view-detail-value">

window.toggleAssigneeChip = function(personId) {
  if (!Array.isArray(state.editingTask.assignees)) {
    state.editingTask.assignees = state.editingTask.assignee ? [state.editingTask.assignee] : [];
  }
  const arr = state.editingTask.assignees;
  const idx = arr.indexOf(personId);
  if (idx >= 0) {
    // Don't allow removing the last assignee — at least one must remain
    if (arr.length > 1) arr.splice(idx, 1);
  } else {
    arr.push(personId);
  }
  // Keep legacy `assignee` in sync with first element for live UI
  state.editingTask.assignee = arr[0] || null;
  // Toggle chip visually without full re-render (preserves input values)
  document.querySelectorAll('.assignee-chip').forEach(el => {
    el.classList.toggle('selected', arr.includes(el.dataset.person));
  });
};

window.saveTask = function() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return;
  const cat = document.getElementById('m-cat').value;
  const priority = document.getElementById('m-priority').value;
  const note = document.getElementById('m-note').value.trim();
  let assignees = Array.isArray(state.editingTask.assignees) ? state.editingTask.assignees.slice() : [];
  if (!assignees.length && state.editingTask.assignee) assignees = [state.editingTask.assignee];
  if (!assignees.length) { alert('יש לבחור לפחות אדם אחד'); return; }
  const primary = assignees[0];

  if (state.modal === 'edit') {
    const t = state.tasks.find(t => t.id === state.editingTask.id);
    if (t) {
      t.name = name; t.category = cat; t.priority = priority; t.note = note;
      t.assignee = primary;      // legacy field — kept in sync
      t.assignees = assignees;   // new canonical field
    }
  } else {
    state.tasks.push({
      id: state.nextId++,
      name, category: cat, priority, note,
      assignee: primary,
      assignees,
      weeklyAssignment: null,
    });

  state.modal = null;
  state.editingTask = null;
  save();
  render();
};

window.confirmAssign = function() {

  setTimeout(() => e.target.classList.remove('dragging'), 0);
};

window.onWeeklyDragOver = function(e) {

  e.currentTarget.classList.add('drag-over');
};

window.onWeeklyDragLeave = function(e) {
  e.currentTarget.classList.remove('drag-over');
};

window.onWeeklyDrop = function(e, personId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragData) return;
  const t = state.tasks.find(t => t.id === dragData.taskId);
  if (t) {
    const current = getTaskAssignees(t);
    let assignees;
    if (dragData.source === 'monthly' && !t.weeklyAssignment) {
      // First time pulling from backlog — single assignee (the drop target)
      assignees = [personId];
    } else {
      // Moving within weekly or adding a co-assignee — additive
      assignees = current.includes(personId) ? current.slice() : [...current, personId];
    }
    t.assignees = assignees;
    t.assignee = assignees[0]; // keep legacy in sync
    t.weeklyAssignment = { week: state.currentWeek, cycle: state.currentCycle, status: t.weeklyAssignment ? t.weeklyAssignment.status : 'todo' };
  }
  dragData = null;
  save();
  render();
};

// ── Calendar & Meetings ──
const HEB_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HEB_DAYS = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const MEETING_TYPES = [
  { id: 'weekly', name: 'סנכרון שבועי', color: 'type-weekly' },
  { id: 'external', name: 'פגישה חיצונית', color: 'type-external' },
  { id: 'custom', name: 'אחר', color: 'type-custom' },
];

function getNextMeeting() {
  const now = new Date();
  now.setHours(0,0,0,0);
  const upcoming = state.meetings
    .map(m => ({ ...m, dateObj: new Date(m.date + 'T' + (m.time || '09:00')) }))
    .filter(m => m.dateObj >= now)
    .sort((a, b) => a.dateObj - b.dateObj);
  return upcoming[0] || null;
}

function renderNextMeeting() {
  const next = getNextMeeting();
  if (!next) {
    return `<div class="next-meeting-section">
      <div class="next-meeting-label">פגישה הבאה</div>
      <div class="next-meeting-empty">אין פגישות קרובות</div>
    </div>`;
  }
  const d = new Date(next.date);
  const dayStr = d.toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long' });
  return `<div class="next-meeting-section">
    <div class="next-meeting-label">פגישה הבאה</div>
    <div class="next-meeting-title">${next.title}</div>
    <div class="next-meeting-time">${dayStr} · ${next.time || '09:00'}</div>
  </div>`;
}

function renderCalendar() {
  const m = state.calendarMonth;
  const y = state.calendarYear;
  const label = `${HEB_MONTHS[m]} ${y}`;
  return `
    <div class="calendar-panel">
      <div class="calendar-header">
        <div class="calendar-nav">
          <button onclick="changeCalMonth(1)">◀</button>
          <div class="calendar-month-label">${label}</div>
          <button onclick="changeCalMonth(-1)">▶</button>
        </div>
        <button class="add-meeting-btn" onclick="openMeetingModal()">+ פגישה חדשה</button>
      </div>
      <div class="calendar-grid">
        <div class="cal-weekdays">
          ${HEB_DAYS.map(d => `<div class="cal-weekday">${d}</div>`).join('')}
        </div>
        <div class="cal-days">
          ${renderCalDays(y, m)}
        </div>
      </div>
    </div>
  `;
}

function renderCalDays(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay(); // 0=Sun
  const totalDays = lastDay.getDate();
  const today = new Date();
  today.setHours(0,0,0,0);

  let cells = '';
  // Previous month padding
  const prevLast = new Date(year, month, 0).getDate();
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevLast - i;
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
  }
  // Current month
  for (let d = 1; d <= totalDays; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = (today.getDate() === d && today.getMonth() === month && today.getFullYear() === year);
    const dayMeetings = state.meetings.filter(m => {
      const start = m.date;
      const end = m.endDate || m.date;
      return dateStr >= start && dateStr <= end;
    });
    cells += `<div class="cal-day ${isToday ? 'today' : ''}" onclick="openMeetingModal('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${dayMeetings.map(m => {
        const t = MEETING_TYPES.find(t => t.id === m.type) || MEETING_TYPES[2];
        const isMulti = m.endDate && m.endDate !== m.date;
        const isStart = dateStr === m.date;
        const isEnd = dateStr === (m.endDate || m.date);
        const label = isStart ? (m.time ? m.time + ' ' : '') + m.title : (isEnd ? m.title + ' ←' : '⋯ ' + m.title);
        return `<div class="cal-meeting ${t.color}${isMulti ? ' multi-day' : ''}" onclick="event.stopPropagation();editMeeting(${m.id})" title="${m.title}${isMulti ? ' (' + m.date + ' → ' + m.endDate + ')' : ''}">${label}</div>`;
      }).join('')}
    </div>`;
  }
  // Next month padding
  const endDow = lastDay.getDay();
  for (let i = 1; i <= 6 - endDow; i++) {
    cells += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  }
  return cells;
}

window.saveMeeting = function() {
  const title = document.getElementById('mt-title').value.trim();
  const date = document.getElementById('mt-date').value;
  const endDate = document.getElementById('mt-endDate').value || date;
  const time = document.getElementById('mt-time').value;
  const notes = document.getElementById('mt-notes').value.trim();
  const type = state.editingMeeting.type || 'weekly';
  if (!title || !date) return;

  // Ensure endDate is not before date
  const finalEndDate = endDate >= date ? endDate : date;

  if (state.meetingModal === 'edit') {
    const m = state.meetings.find(m => m.id === state.editingMeeting.id);
    if (m) { Object.assign(m, { title, date, endDate: finalEndDate, time, notes, type }); }
  } else {
    // Add the meeting
    state.meetings.push({ id: state.meetingNextId++, title, date, endDate: finalEndDate, time, notes, type });
    // If weekly type, auto-generate next 7 occurrences (every 5 days)
    if (type === 'weekly') {
      let d = new Date(date);
      for (let i = 1; i <= 7; i++) {
        d.setDate(d.getDate() + 5);
        const autoDate = d.toISOString().split('T')[0];
        state.meetings.push({ id: state.meetingNextId++, title, date: autoDate, endDate: autoDate, time, notes, type: 'weekly' });
      }
    }
  }
  state.meetingModal = null;
  state.editingMeeting = null;
  save();
  render();
};

  state.meetings = state.meetings.filter(m => m.id !== id);
  state.meetingModal = null;
  state.editingMeeting = null;

function attachEvents() {
  // Resize handle
  const handle = document.getElementById('resize-handle');
  const monthly = document.querySelector('.monthly-panel');
  if (!handle || !monthly) return;
  let startX, startW;
  handle.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    startW = monthly.offsetWidth;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    const onMove = ev => {
      // RTL: moving mouse left (negative delta) = wider panel
      const delta = startX - ev.clientX;
      const newW = Math.min(Math.max(startW + delta, 380), window.innerWidth * 0.7);
      monthly.style.width = newW + 'px';
      state.monthlyWidth = newW;
    };
    const onUp = () => {
      saveToServer();
      handle.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Undo System ──
let undoToastEl = null;
let undoTimeout = null;
let currentUndo = null;

function showUndoToast(message, type, item) {
  // Clear previous
  if (undoTimeout) clearTimeout(undoTimeout);
  if (undoToastEl) undoToastEl.remove();

  currentUndo = { type, item };

  undoToastEl = document.createElement('div');
  undoToastEl.className = 'undo-toast';
  undoToastEl.innerHTML = `
    <span>${message}</span>
    <button class="undo-btn" onclick="performUndo()">↩ בטל</button>
    <div class="undo-timer"><div class="undo-timer-bar"></div></div>
  `;
  document.body.appendChild(undoToastEl);

  // Trigger animation
  requestAnimationFrame(() => undoToastEl.classList.add('show'));

  undoTimeout = setTimeout(() => {
    hideUndoToast();
  }, 8000);
}

function hideUndoToast() {
  if (undoToastEl) {
    undoToastEl.classList.remove('show');
    setTimeout(() => { if (undoToastEl) { undoToastEl.remove(); undoToastEl = null; } }, 300);
  }
  currentUndo = null;
  if (undoTimeout) { clearTimeout(undoTimeout); undoTimeout = null; }
}

window.performUndo = function() {
  if (!currentUndo) return;
  const { type, item } = currentUndo;
  if (type === 'task') {
    state.tasks.push(item);
  } else if (type === 'meeting') {
    state.meetings.push(item);
  }
  save();
  render();
  hideUndoToast();
};

// ── GitHub Projects Sync ──
async function syncGitHub() {
  const btn = document.getElementById('sync-btn');
  if (!btn) return;
  const original = btn.textContent;
  btn.textContent = '⏳ מסנכרן...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/sync-github', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    const data = await res.json();
    if (!res.ok) {
      btn.textContent = '✗ שגיאה';
      alert('שגיאת סנכרון: ' + (data.error || 'Unknown'));
    } else {
      btn.textContent = `✓ ${data.added} חדשות, ${data.updated} עודכנו`;
      await loadState();
      render();
    }
  } catch (e) {
    btn.textContent = '✗ שגיאה';
    alert('שגיאת סנכרון: ' + e.message);
  }
  setTimeout(() => {
    btn.textContent = original;
    btn.disabled = false;
  }, 3000);
}

// ── Initial render ──
async function init() {
  await loadState();
  render();
}
init();

// ── Auto-refresh (poll every 30s for teammate changes) ──
setInterval(async () => {
  // Skip refresh if modal open, save pending, or undo active
  if (!state.modal && !state.notePopup && !state.meetingModal && !saveTimeout && !currentUndo) {
    await loadState();
    render();
  }
}, 30000);
</script>
